<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloudbox Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="demo">
    <header class="site-header">
      <a class="brand" href="./index.html">Cloudbox</a>
      <nav>
        <a href="./docs.html">Docs</a>
        <a href="./demo.html">Demo</a>
        <a href="https://github.com/acoyfellow/cloudbox">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="demo-hero">
        <div>
          <p class="eyebrow">interactive demo</p>
          <h1>Can an agent complete a realistic client review?</h1>
          <p class="lede">This demo shows what Cloudbox creates: a scenario, a workspace, an agent work trail, and a scorecard.</p>
        </div>
        <form id="generate-form">
          <textarea id="persona" rows="5">A senior financial advisor responsible for portfolio refreshes, high-net-worth onboarding, investment committee materials, compliance review, and multi-artifact client deliverables.</textarea>
          <div class="form-row">
            <select id="mode" aria-label="simulation mode">
              <option value="demo">Demo, 3 days</option>
              <option value="short">Short, 5 days</option>
              <option value="full-paper">Full paper mode, 20 days</option>
            </select>
            <button type="submit">Generate another Cloudbox</button>
          </div>
        </form>
      </section>

      <section class="demo-guide" id="demo-guide"></section>

      <nav class="tabs" aria-label="Cloudbox views">
        <button class="active" data-tab="scenario">Scenario</button>
        <button data-tab="workspace">Workspace</button>
        <button data-tab="work">Agent Work</button>
        <button data-tab="results">Results</button>
        <button data-tab="downloads">Downloads</button>
      </nav>

      <section id="panel" class="panel"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
