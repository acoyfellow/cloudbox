<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloudbox Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="demo">
    <header class="site-header">
      <a class="brand" href="./index.html">Cloudbox</a>
      <nav>
        <a href="./docs.html">Docs</a>
        <a href="./demo.html">Demo</a>
        <a href="https://github.com/acoyfellow/cloudbox">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="demo-hero simple-hero">
        <div>
          <p class="eyebrow">demo workspace</p>
          <h1>Client review project.</h1>
          <p class="lede">A seeded workspace for testing whether an agent can use files, keep numbers consistent, and produce a final package.</p>
        </div>
      </section>

      <section id="demo-summary" class="focused-demo"></section>

      <section class="generate-section">
        <div>
          <p class="eyebrow">try another</p>
          <h2>Generate a new workspace.</h2>
        </div>
        <form id="generate-form">
          <textarea id="persona" rows="4">A senior financial advisor responsible for portfolio refreshes, investment committee materials, compliance review, and client deliverables.</textarea>
          <div class="form-row">
            <select id="mode" aria-label="run length">
              <option value="demo">Demo, 3 days</option>
              <option value="short">Short, 5 days</option>
              <option value="full-paper">Full, 20 days</option>
            </select>
            <button type="submit">Generate workspace</button>
          </div>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
