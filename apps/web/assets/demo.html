<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloudbox Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="demo">
    <header class="site-header">
      <a class="brand" href="./index.html">Cloudbox</a>
      <nav>
        <a href="./docs.html">Docs</a>
        <a href="./demo.html">Demo</a>
        <a href="https://github.com/acoyfellow/cloudbox">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="demo-form-page">
        <div class="demo-form-copy">
          <p class="eyebrow">demo</p>
          <h1>Make a fake workspace.</h1>
          <p class="lede">Type a job. Get files, a task, work history, downloads, and a score.</p>
        </div>

        <form id="generate-form" class="workspace-form">
          <label for="persona">Job</label>
          <textarea id="persona" rows="4">A senior financial advisor preparing a client review package with source PDFs, spreadsheets, compliance notes, and final slides.</textarea>
          <div class="form-row">
            <select id="mode" aria-label="run length">
              <option value="demo">3-day run</option>
              <option value="short">5-day run</option>
              <option value="full-paper">20-day run</option>
            </select>
            <button type="submit">Make workspace</button>
          </div>
        </form>
      </section>

      <section id="demo-summary" class="workspace-output"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
