name: reset-alchemy-state

on:
  workflow_dispatch:
    inputs:
      key:
        description: "Exact Alchemy state key to delete"
        required: true
        default: "cloudbox/prod/cloudbox-worker/cloudbox-runner"
      confirm:
        description: "Type DELETE to confirm"
        required: true

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_PERSONAL_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PERSONAL_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
  ALCHEMY_STATE_SCRIPT: cloudbox-state

jobs:
  delete-key:
    if: ${{ github.event.inputs.confirm == 'DELETE' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Delete stale Alchemy key
        run: node scripts/alchemy-state-delete.mjs "${{ github.event.inputs.key }}"
