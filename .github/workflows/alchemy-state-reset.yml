name: reset-alchemy-state

on:
  workflow_dispatch:
    inputs:
      action:
        description: "get, list, or delete"
        required: true
        default: "delete"
      key:
        description: "Alchemy state key"
        required: true
        default: "cloudbox/prod/cloudbox-worker/cloudbox-runner"
      confirm:
        description: "Type DELETE to delete; anything for get/list"
        required: true

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_PERSONAL_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PERSONAL_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
  ALCHEMY_STATE_SCRIPT: cloudbox-state

jobs:
  state:
    if: ${{ github.event.inputs.action != 'delete' || github.event.inputs.confirm == 'DELETE' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Call Alchemy state
        run: node scripts/alchemy-state-delete.mjs "${{ github.event.inputs.action }}" "${{ github.event.inputs.key }}"
