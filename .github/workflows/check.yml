name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: oven/bun:1.3.13
    steps:
      - uses: actions/checkout@v4
      - run: bun install --ignore-scripts --backend=copyfile
        timeout-minutes: 10
      - run: bun run build
        timeout-minutes: 5
      - run: bun run typecheck
        timeout-minutes: 3
      - run: bun run test
        timeout-minutes: 3

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    container:
      image: oven/bun:1.3.13
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: bun install --ignore-scripts --backend=copyfile
        timeout-minutes: 10
      - name: Deploy Cloudbox with Alchemy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDBOX_API_TOKEN: ${{ secrets.CLOUDBOX_API_TOKEN }}
        run: bun run alchemy:deploy
        timeout-minutes: 10
