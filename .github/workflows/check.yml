name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: npm install -g pnpm@10.20.0
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
        timeout-minutes: 5
      - run: pnpm run build
        timeout-minutes: 5
      - run: pnpm run typecheck
        timeout-minutes: 3
      - run: pnpm run test
        timeout-minutes: 3

  # Deployment is deliberately separate from CI health. Enable automatic
  # deploys with the production environment variable CLOUDBOX_AUTO_DEPLOY=true,
  # or run this workflow manually after rotating/verifying Cloudflare tokens.
  deploy:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && vars.CLOUDBOX_AUTO_DEPLOY == 'true'))
    needs: check
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: npm install -g pnpm@10.20.0
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
        timeout-minutes: 5
      - name: Deploy Cloudbox with Alchemy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PERSONAL_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDBOX_API_TOKEN: ${{ secrets.CLOUDBOX_API_TOKEN }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          CLOUDBOX_D1_DATABASE_ID: ${{ secrets.CLOUDBOX_D1_DATABASE_ID }}
          CLOUDBOX_RUNNER_RESOURCE_ID: cloudbox-runner-v2
          CLOUDBOX_RUNNER_NAME: cloudbox-runner-v2
          CLOUDBOX_RUNNER_INSTANCE_TYPE: ${{ vars.CLOUDBOX_RUNNER_INSTANCE_TYPE || 'standard' }}
          CLOUDBOX_RUNNER_MAX_INSTANCES: ${{ vars.CLOUDBOX_RUNNER_MAX_INSTANCES || '2' }}
          CLOUDBOX_DESKTOP_RUNNER_RESOURCE_ID: cloudbox-desktop-runner
          CLOUDBOX_DESKTOP_RUNNER_NAME: cloudbox-desktop-runner
          CLOUDBOX_DESKTOP_RUNNER_INSTANCE_TYPE: ${{ vars.CLOUDBOX_DESKTOP_RUNNER_INSTANCE_TYPE || 'standard-2' }}
          CLOUDBOX_DESKTOP_RUNNER_MAX_INSTANCES: ${{ vars.CLOUDBOX_DESKTOP_RUNNER_MAX_INSTANCES || '1' }}
          CLOUDBOX_GITLAB_TOKEN: ${{ secrets.CLOUDBOX_GITLAB_TOKEN }}
          OAUTH_PROXY_MASTER_KEY: ${{ secrets.OAUTH_PROXY_MASTER_KEY }}
          GITLAB_CFDATA_CLIENT_ID: ${{ secrets.GITLAB_CFDATA_CLIENT_ID }}
          GITLAB_CFDATA_CLIENT_SECRET: ${{ secrets.GITLAB_CFDATA_CLIENT_SECRET }}
          GITLAB_CFDATA_CF_ACCESS_CLIENT_ID: ${{ secrets.GITLAB_CFDATA_CF_ACCESS_CLIENT_ID }}
          GITLAB_CFDATA_CF_ACCESS_CLIENT_SECRET: ${{ secrets.GITLAB_CFDATA_CF_ACCESS_CLIENT_SECRET }}
          GITLAB_OAUTH_APP_ID: ${{ secrets.GITLAB_OAUTH_APP_ID }}
          CLOUDBOX_INTERNAL_TOKEN: ${{ secrets.CLOUDBOX_INTERNAL_TOKEN }}
          CLOUDBOX_PUBLISH_APPROVAL_TOKEN: ${{ secrets.CLOUDBOX_PUBLISH_APPROVAL_TOKEN }}
        run: bun run alchemy:deploy
        timeout-minutes: 10
