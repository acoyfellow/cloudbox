<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0D10"/>
      <stop offset="1" stop-color="#15181C"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6821F"/>
      <stop offset="1" stop-color="#FBAD41"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#F6821F" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F6821F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="url(#orange)"/>
    <rect x="22" y="22" width="28" height="28" fill="#FBAD41"/>
    <rect x="28" y="28" width="16" height="16" fill="#FFF7E8" fill-opacity="0.9"/>
  </g>

  <text x="172" y="135" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">Cloudbox</text>

  <!-- headline -->
  <text x="80" y="320" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="80" font-weight="600" fill="#FFFFFF" letter-spacing="-2.2">Fresh computers</text>
  <text x="80" y="410" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="80" font-weight="600" fill="#FFFFFF" letter-spacing="-2.2">on <tspan fill="url(#orange)">Cloudflare</tspan>.</text>

  <!-- subhead -->
  <text x="80" y="480" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#B7BDC4" letter-spacing="-0.3">Clone a repo. Run commands. Verify.</text>
  <text x="80" y="516" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#B7BDC4" letter-spacing="-0.3">Return receipts and one artifact.</text>

  <!-- footer URL -->
  <text x="80" y="585" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="500" fill="#6B7079">cloudbox.coey.dev</text>

  <!-- right-side decorative receipts card -->
  <g transform="translate(720, 200)" opacity="0.92">
    <rect width="400" height="280" rx="14" fill="#1B1F24" stroke="#2A2F36" stroke-width="1"/>
    <circle cx="22" cy="22" r="5" fill="#FF5F57"/>
    <circle cx="42" cy="22" r="5" fill="#FEBC2E"/>
    <circle cx="62" cy="22" r="5" fill="#28C840"/>
    <text x="20" y="72" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#28C840">$ cloudbox.run()</text>
    <text x="20" y="106" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#B7BDC4">✓ clone           42ms</text>
    <text x="20" y="134" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#B7BDC4">✓ install        2.1s</text>
    <text x="20" y="162" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#B7BDC4">✓ test           0.9s</text>
    <text x="20" y="190" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#B7BDC4">✓ verify         0.4s</text>
    <text x="20" y="218" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#F6821F">→ HANDOFF.md</text>
    <text x="20" y="252" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#6B7079">5 receipts · 1 artifact</text>
  </g>
</svg>
